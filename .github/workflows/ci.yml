name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Lint Code
      run: npm run lint

    - name: Run Unit Tests
      run: npm run test

    - name: Build Project
      run: npm run build
      env:
        # Initial placeholder for build check
        VITE_LIVEBLOCKS_PUBLIC_KEY: ${{ secrets.VITE_LIVEBLOCKS_PUBLIC_KEY || 'pk_placeholder' }}

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist-22.x
        path: dist/
